server.port=8082

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/QuanLyCuaHangGiaDung?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Groq API
groq.api.key=
groq.api.url=YOUR_GROQ_API_KEY
groq.api.model=llama-3.3-70b-versatile

spring.main.banner-mode=off

